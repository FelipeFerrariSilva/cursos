<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <h1> Operacao soma dois fatores</h1>
        <div class="inputs">
            <input type="number" id="entrada1" placeholder="Digite o primeiro numero">
            <input type="number" id="entrada2" placeholder="Digite o segundo numero">

        </div>
        <div class="botoes">
            <button onclick="somar()">+</button>
            <button onclick="dividir()">/</button>

        </div>
        <div class="resultado">
            <h2>resultado</h2>
            <h2 id="resultado"></h2>

        </div>

    </div>



<script src="script.js">

</script>
    
</body>
</html>
